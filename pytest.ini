[pytest]
DJANGO_SETTINGS_MODULE = project_site.settings
python_files = tests.py test_*.py *_tests.py
# Se mantienen dos filtros para el mismo warning de DRF porque,
# segun version de dependencias/pytest, puede resolverse como
# DeprecationWarning generico o como RemovedInDjango60Warning especifico.
filterwarnings =
	ignore:Converter 'drf_format_suffix' is already registered.*:DeprecationWarning:rest_framework.urlpatterns
	ignore:Converter 'drf_format_suffix' is already registered.*:django.utils.deprecation.RemovedInDjango60Warning:rest_framework.urlpatterns
